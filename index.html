<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese to Sinhala Verb List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <header style="justify-content: center; margin-bottom: 20px;">
            <h1>Nihongo Verb List</h1>
        </header>

        <main class="glass-panel"
            style="padding: 24px; min-height: auto; max-height: calc(100vh - 120px); display: flex; flex-direction: column;">
            <div id="study-screen" class="screen scrollable-screen active" style="flex: 1;">
                <div id="vocab-list-container" class="vocab-list">
                    <!-- Injected via JS -->
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
